<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard GFE — Clara Assistance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F4F2;color:#0e1a3a;min-height:100vh}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.loading-spin{width:40px;height:40px;border:3px solid #E2DBD4;border-top-color:#b8966e;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:#7a7065}
.err{text-align:center;padding:40px;color:#DC2626}
/* HEADER */
.dh{background:#0e1a3a;padding:18px 32px;display:flex;justify-content:space-between;align-items:center}
.dh-logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:#fff}
.dh-logo span{color:#b8966e;font-weight:600}
.dh-right{text-align:right}
.dh-emp{font-size:13px;color:rgba(255,255,255,.7)}
.dh-mes{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#b8966e;margin-top:2px}
.dh-dt{font-size:9px;color:rgba(255,255,255,.3);margin-top:3px}
/* MÊS SELECTOR */
.mes-bar{background:#fff;border-bottom:1px solid #E2DBD4;padding:12px 32px;display:flex;gap:8px;overflow-x:auto}
.mes-btn{padding:6px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid #E2DBD4;background:transparent;color:#7a7065;font-family:inherit;transition:all .2s;white-space:nowrap}
.mes-btn:hover{border-color:#0e1a3a;color:#0e1a3a}
.mes-btn.active{background:#0e1a3a;color:#fff;border-color:#0e1a3a}
/* BODY */
.body{padding:24px 32px;max-width:1200px;margin:0 auto}
.sec-tit{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#0e1a3a;margin:20px 0 14px;padding-bottom:10px;border-bottom:1px solid #E2DBD4}
/* KPI GRID */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.kg3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.kc{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #E2DBD4;position:relative;overflow:hidden}
.kc-g{border-top:3px solid #16A34A}.kc-r{border-top:3px solid #DC2626}
.kc-q{border-top:3px solid #7B2FBE}.kc-go{border-top:3px solid #b8966e}.kc-n{border-top:3px solid #0e1a3a}
.kl{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:#7a7065;margin-bottom:6px}
.kv{font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;color:#0e1a3a}
.kv.pos{color:#16A34A}.kv.neg{color:#DC2626}.kv.go{color:#b8966e}
.ks{font-size:10px;color:#7a7065;margin-top:4px}
.ki{position:absolute;top:14px;right:16px;font-size:22px;opacity:.12}
/* PROGRESS */
.prog{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #E2DBD4;margin-bottom:20px}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.prog-trk{background:#F0EDE8;border-radius:20px;height:6px;overflow:hidden}
.prog-fill{height:6px;border-radius:20px;background:linear-gradient(90deg,#5B1F9A,#7B2FBE,#9B4FDE);transition:width 1s ease}
.prog-sub{display:flex;justify-content:space-between;font-size:10.5px;color:#7a7065;margin-top:8px}
/* CHARTS */
.cc{background:#fff;border-radius:12px;padding:18px;border:1px solid #E2DBD4}
.cc-tit{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#7a7065;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ch{position:relative;height:220px}
/* TABELA */
.tbl-wrap{background:#fff;border-radius:12px;border:1px solid #E2DBD4;overflow:hidden;margin-bottom:20px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead th{background:#0e1a3a;color:rgba(255,255,255,.75);padding:10px 14px;text-align:left;font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.tbl tbody tr{border-bottom:1px solid #E2DBD4;transition:background .12s}
.tbl tbody tr:hover{background:#F5F4F2}
.tbl tbody td{padding:9px 14px;vertical-align:middle}
.pos{color:#16A34A;font-weight:700}.neg{color:#DC2626;font-weight:700}
.tag{background:#F0EDE8;color:#7a7065;font-size:9.5px;padding:2px 9px;border-radius:20px;border:1px solid #E2DBD4}
/* SCORE */
.score-box{background:#0e1a3a;border-radius:12px;padding:24px;color:#fff;margin-bottom:20px}
.score-num{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:300;line-height:1}
.score-status{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#b8966e;margin-top:4px}
.score-dims{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:20px}
.score-dim{background:rgba(255,255,255,.06);border-radius:10px;padding:12px}
.score-dim-nome{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px}
.score-dim-val{font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif}
.score-dim-peso{font-size:9px;color:rgba(255,255,255,.35);margin-top:2px}
.score-dim-bar{background:rgba(255,255,255,.1);border-radius:20px;height:3px;margin-top:6px;overflow:hidden}
.score-dim-fill{height:3px;border-radius:20px;transition:width 1s ease}
/* UPDATE badge */
.update-badge{position:fixed;bottom:20px;right:20px;background:#0e1a3a;color:#fff;padding:8px 14px;border-radius:20px;font-size:10px;display:flex;align-items:center;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.update-dot{width:6px;height:6px;background:#16A34A;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* FOOTER */
.ft{background:#0e1a3a;padding:16px 32px;text-align:center;font-size:10px;color:rgba(255,255,255,.3);margin-top:24px}
@media(max-width:900px){.kg{grid-template-columns:1fr 1fr}.kg2{grid-template-columns:1fr}.kg3{grid-template-columns:1fr}.score-dims{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="loading-spin"></div>
  <div class="loading-txt">Carregando dados atualizados...</div>
</div>

<div id="app" style="display:none">
  <!-- Header -->
  <div class="dh">
    <div>
      <div class="dh-logo">GFE <span>Financeiro</span></div>
      <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:2px">Dashboard Interativo</div>
    </div>
    <div class="dh-right">
      <div class="dh-emp" id="dh-emp">—</div>
      <div class="dh-mes" id="dh-mes">—</div>
      <div class="dh-dt" id="dh-dt">—</div>
    </div>
  </div>

  <!-- Seletor de mês -->
  <div class="mes-bar" id="mes-bar"></div>

  <!-- Conteúdo dinâmico -->
  <div class="body" id="dash-body"></div>

  <div class="ft" id="dash-ft">GFE · Dashboard Automático · Dados via Google Sheets</div>
</div>

<div class="update-badge">
  <div class="update-dot"></div>
  <span id="update-txt">Atualizado agora</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// GFE DASHBOARD LIVE — lê dados do portal.html em tempo real
// Atualiza automaticamente a cada 5 minutos
// ═══════════════════════════════════════════════════════════════

const PORTAL_URL = 'portal.html?_=' + Date.now();
const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let DATA = null; // dados extraídos do portal
let mesSel = 0;  // mês selecionado (0-indexed)
const charts = {};

function fmtR(v) {
  v = parseFloat(v) || 0;
  const s = Math.abs(v).toLocaleString('pt-BR', {minimumFractionDigits:2});
  return (v >= 0 ? 'R$ ' : 'R$ -') + s;
}
function pct(a, b) { return b > 0 ? Math.round(a/b*100) : 0; }
function kc(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }

// ── Carregar dados do portal.html ────────────────────────────────────────────
async function carregarDados() {
  try {
    const resp = await fetch(PORTAL_URL);
    const html = await resp.text();
    return extrairDados(html);
  } catch(e) {
    console.error('Erro ao carregar portal:', e);
    return null;
  }
}

function extrairDados(html) {
  const dados = {};

  // Extrair CFG
  const cfgM = html.match(/const CFG = (\{[\s\S]+?\});/);
  if (cfgM) {
    try { dados.cfg = eval('(' + cfgM[1] + ')'); } catch(e) {}
  }

  // Extrair dadosMensais
  const dmM = html.match(/const dadosMensais=(\{[\s\S]+?\});/);
  if (dmM) {
    try { dados.dm = JSON.parse(dmM[1]); } catch(e) {}
  }

  // Extrair SCORE_CFG
  const scM = html.match(/const SCORE_CFG = (\{[\s\S]+?\});/);
  if (scM) {
    try { dados.score = eval('(' + scM[1] + ')'); } catch(e) {}
  }

  // Extrair RUNWAY_CFG
  const rwM = html.match(/const RUNWAY_CFG = (\{[\s\S]+?\});/);
  if (rwM) {
    try { dados.runway = eval('(' + rwM[1] + ')'); } catch(e) {}
  }

  // Extrair VENCIMENTOS
  const vcM = html.match(/const VENCIMENTOS = (\[[\s\S]*?\]);/);
  if (vcM) {
    try { dados.venc = JSON.parse(vcM[1]); } catch(e) { dados.venc = []; }
  }

  return dados;
}

// ── Renderizar dashboard com os dados ───────────────────────────────────────
function renderizar(data, mes) {
  const cfg   = data.cfg   || {};
  const dm    = data.dm    || {};
  const score = data.score || {};
  const rw    = data.runway || {};
  const venc  = data.venc  || [];

  const fat   = dm.fat   || Array(12).fill(0);
  const desp  = dm.desp  || Array(12).fill(0);
  const res   = dm.res   || Array(12).fill(0);
  const metas = dm.metas || Array(12).fill(cfg.meta || 100000);
  const labels= dm.labels|| MESES_PT.map((_,i)=>['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][i]);

  const fatM  = fat[mes]  || 0;
  const despM = desp[mes] || 0;
  const resM  = res[mes]  || 0;
  const metaM = metas[mes]|| cfg.meta || 100000;
  const margem= fatM > 0 ? ((resM/fatM)*100).toFixed(1) : 0;
  const pctMeta = pct(fatM, metaM);
  const fatAcum = fat.reduce((s,v)=>s+v,0);
  const metaAnu = metas.reduce((s,v)=>s+v,0);
  const pctAnu  = pct(fatAcum, metaAnu);
  const despAcum= desp.reduce((s,v)=>s+v,0);
  const resAcum = fatAcum - despAcum;

  const mesNome = MESES_PT[mes];
  const ano = new Date().getFullYear();

  // Header
  document.getElementById('dh-emp').textContent = cfg.cliente?.nome || 'GFE';
  document.getElementById('dh-mes').textContent = mesNome + ' ' + ano;
  document.getElementById('dh-dt').textContent  = 'Atualizado automaticamente via Google Sheets';

  // Seletor de meses
  const bar = document.getElementById('mes-bar');
  const mesesComDados = fat.map((v,i) => v > 0 || desp[i] > 0 ? i : -1).filter(i=>i>=0);
  bar.innerHTML = mesesComDados.map(i => `
    <button class="mes-btn ${i===mes?'active':''}" onclick="selecionarMes(${i})">
      ${MESES_PT[i]}
    </button>
  `).join('');

  // Score color
  const scoreStatus = score.status || 'alerta';
  const scoreColor = {critico:'#DC2626',alerta:'#B45309',saudavel:'#16A34A',estrategico:'#1D4ED8'}[scoreStatus] || '#B45309';

  // Body
  const body = document.getElementById('dash-body');
  body.innerHTML = `
    <div class="sec-tit">Resumo — ${mesNome} ${ano}</div>

    <div class="kg">
      <div class="kc kc-g"><div class="ki">📥</div>
        <div class="kl">Faturamento</div>
        <div class="kv pos">${fmtR(fatM)}</div>
        <div class="ks">${mesNome} ${ano}</div>
      </div>
      <div class="kc kc-r"><div class="ki">📤</div>
        <div class="kl">Despesas</div>
        <div class="kv neg">${fmtR(despM)}</div>
        <div class="ks">${mesNome} ${ano}</div>
      </div>
      <div class="kc ${resM>=0?'kc-g':'kc-r'}"><div class="ki">📊</div>
        <div class="kl">Resultado</div>
        <div class="kv ${resM>=0?'pos':'neg'}">${fmtR(resM)}</div>
        <div class="ks">Margem: ${margem}%</div>
      </div>
      <div class="kc kc-go"><div class="ki">🎯</div>
        <div class="kl">% da Meta</div>
        <div class="kv ${pctMeta>=100?'pos':pctMeta>=70?'go':'neg'}">${pctMeta}%</div>
        <div class="ks">Meta: ${fmtR(metaM)}</div>
      </div>
    </div>

    <!-- Barra meta mensal -->
    <div class="prog">
      <div class="prog-top">
        <div>
          <div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#7a7065">Meta Mensal — ${mesNome}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:${pctMeta>=100?'#16A34A':pctMeta>=70?'#B45309':'#DC2626'}">${pctMeta}%</div>
        </div>
        <div style="text-align:right;font-size:12px;color:#7a7065">${fmtR(fatM)} de ${fmtR(metaM)}</div>
      </div>
      <div class="prog-trk"><div class="prog-fill" style="width:${Math.min(pctMeta,100)}%"></div></div>
      <div class="prog-sub"><span>Faturamento realizado</span><strong>Meta: ${fmtR(metaM)}</strong></div>
    </div>

    <div class="sec-tit">Evolução Mensal</div>
    <div class="kg2">
      <div class="cc">
        <div class="cc-tit">📊 Faturamento vs Despesas</div>
        <div class="ch"><canvas id="cFat"></canvas></div>
      </div>
      <div class="cc">
        <div class="cc-tit">📈 Resultado Mensal</div>
        <div class="ch"><canvas id="cRes"></canvas></div>
      </div>
    </div>
    <div class="cc" style="margin-bottom:20px">
      <div class="cc-tit">🎯 Faturamento vs Meta Mensal</div>
      <div class="ch"><canvas id="cMeta"></canvas></div>
    </div>

    <div class="sec-tit">GFE Score — ${score.periodo || mesNome+' '+ano}</div>
    <div class="score-box">
      <div style="display:flex;align-items:flex-end;gap:20px">
        <div>
          <div class="score-num" style="color:${scoreColor}">${score.atual || 0}</div>
          <div class="score-status">${{critico:'Crítico',alerta:'Em Alerta',saudavel:'Saudável',estrategico:'Estratégico'}[scoreStatus]||'—'}</div>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:8px">
          Evolução: <strong style="color:${(score.evolucao||'0').startsWith('-')?'#DC2626':'#16A34A'}">${score.evolucao||'+0'}</strong> pts vs mês anterior
        </div>
      </div>
      <div class="score-dims">
        ${(score.dims||[]).map(d => `
          <div class="score-dim">
            <div class="score-dim-nome">${d.nome}</div>
            <div class="score-dim-val" style="color:${d.val>=80?'#16A34A':d.val>=60?'#B45309':'#DC2626'}">${d.val}</div>
            <div class="score-dim-peso">${d.peso}</div>
            <div class="score-dim-bar"><div class="score-dim-fill" style="width:${d.val}%;background:${d.val>=80?'#16A34A':d.val>=60?'#B45309':'#DC2626'}"></div></div>
            <div style="font-size:9px;color:rgba(255,255,255,.4);margin-top:4px">${d.descr||''}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="sec-tit">Acumulado ${ano}</div>
    <div class="kg">
      <div class="kc kc-g"><div class="kl">Fat. Acumulado</div>
        <div class="kv pos">${fmtR(fatAcum)}</div></div>
      <div class="kc kc-r"><div class="kl">Desp. Acumuladas</div>
        <div class="kv neg">${fmtR(despAcum)}</div></div>
      <div class="kc ${resAcum>=0?'kc-g':'kc-r'}"><div class="kl">Resultado Acum.</div>
        <div class="kv ${resAcum>=0?'pos':'neg'}">${fmtR(resAcum)}</div></div>
      <div class="kc kc-q"><div class="kl">Execução Meta Anual</div>
        <div class="kv ${pctAnu>=100?'pos':pctAnu>=50?'go':'neg'}">${pctAnu}%</div>
        <div class="ks">${fmtR(fatAcum)} de ${fmtR(metaAnu)}</div></div>
    </div>

    <!-- Barra meta anual -->
    <div class="prog">
      <div class="prog-top">
        <div>
          <div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#7a7065">Meta Anual ${ano}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:${pctAnu>=100?'#16A34A':pctAnu>=50?'#B45309':'#DC2626'}">${pctAnu}%</div>
        </div>
        <div style="text-align:right;font-size:12px;color:#7a7065">${fmtR(fatAcum)} de ${fmtR(metaAnu)}</div>
      </div>
      <div class="prog-trk"><div class="prog-fill" style="width:${Math.min(pctAnu,100)}%"></div></div>
      <div class="prog-sub"><span>Faturamento acumulado</span><strong>Meta Anual: ${fmtR(metaAnu)}</strong></div>
    </div>

    ${venc.length > 0 ? `
    <div class="sec-tit">Vencimentos Próximos</div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Data</th><th>Nome</th><th>Tipo</th><th>Valor</th></tr></thead>
        <tbody>
          ${venc.slice(0,10).map(v=>`
            <tr>
              <td>${v.dia}/${v.mes}</td>
              <td>${v.nome||'—'}</td>
              <td><span class="tag" style="color:${v.tipo==='pagar'?'#DC2626':'#16A34A'}">${v.tipo==='pagar'?'💸 A Pagar':'📬 A Receber'}</span></td>
              <td class="${v.tipo==='pagar'?'neg':'pos'}">${v.valor}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;

  // Renderizar gráficos
  setTimeout(() => {
    const opts = {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:10},boxWidth:10,padding:10}}},
      scales:{
        y:{ticks:{callback:v=>'R$'+(Math.abs(v)/1000).toFixed(0)+'k',font:{size:9.5}},grid:{color:'#E2DBD4'}},
        x:{ticks:{font:{size:9.5}},grid:{display:false}}
      }
    };

    // Gráfico Fat vs Desp
    kc('cFat');
    charts['cFat'] = new Chart(document.getElementById('cFat'), {
      type:'bar',
      data:{labels,datasets:[
        {label:'Faturamento',data:fat,backgroundColor:'rgba(22,163,74,.7)',borderRadius:4,borderSkipped:false},
        {label:'Despesas',data:desp,backgroundColor:'rgba(220,38,38,.7)',borderRadius:4,borderSkipped:false}
      ]},
      options:opts
    });

    // Gráfico Resultado
    kc('cRes');
    charts['cRes'] = new Chart(document.getElementById('cRes'), {
      type:'bar',
      data:{labels,datasets:[{
        label:'Resultado',
        data:res,
        backgroundColor:res.map(v=>v>=0?'rgba(22,163,74,.75)':'rgba(220,38,38,.75)'),
        borderRadius:5,borderSkipped:false
      }]},
      options:{...opts,plugins:{legend:{display:false}}}
    });

    // Gráfico Fat vs Meta
    kc('cMeta');
    charts['cMeta'] = new Chart(document.getElementById('cMeta'), {
      type:'bar',
      data:{labels,datasets:[
        {label:'Faturamento',data:fat,backgroundColor:'rgba(184,150,110,.8)',borderRadius:4,borderSkipped:false},
        {label:'Meta',data:metas,type:'line',borderColor:'rgba(14,26,58,.5)',borderDash:[6,4],fill:false,tension:0,pointRadius:0,borderWidth:2}
      ]},
      options:opts
    });
  }, 100);

  // Footer
  document.getElementById('dash-ft').textContent =
    `${cfg.cliente?.nome||'GFE'} · Dashboard Automático · Dados via Google Sheets · Atualizado em ${new Date().toLocaleString('pt-BR')}`;
}

function selecionarMes(i) {
  mesSel = i;
  renderizar(DATA, mesSel);
}

// ── Inicialização e auto-refresh ─────────────────────────────────────────────
async function init() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('app').style.display = 'none';

  DATA = await carregarDados();

  if (!DATA || !DATA.dm) {
    document.getElementById('loading').innerHTML =
      '<div class="err">❌ Erro ao carregar dados. Verifique se o portal.html está no mesmo repositório.</div>';
    return;
  }

  // Selecionar mês mais recente com dados
  const fat = DATA.dm.fat || [];
  const mesesComDados = fat.map((v,i)=>({i,v})).filter(x=>x.v>0);
  mesSel = mesesComDados.length > 0
    ? mesesComDados[mesesComDados.length-1].i
    : new Date().getMonth();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  renderizar(DATA, mesSel);

  // Atualizar timestamp
  document.getElementById('update-txt').textContent =
    'Atualizado às ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

// Auto-refresh a cada 5 minutos
async function autoRefresh() {
  const novosDados = await carregarDados();
  if (novosDados && novosDados.dm) {
    DATA = novosDados;
    renderizar(DATA, mesSel);
    document.getElementById('update-txt').textContent =
      'Atualizado às ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  }
}

init();
setInterval(autoRefresh, 5 * 60 * 1000);
</script>

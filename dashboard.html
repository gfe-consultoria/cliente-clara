<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard GFE — Clara Assistance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#0e1a3a;--navy2:#172040;--navy3:#1e2a50;
  --q:#7B2FBE;--q2:#9B4FDE;--qdark:#5A1F9A;
  --gold:#b8966e;--gold2:#d4b896;
  --bg:#F5F4F2;--card:#FFFFFF;--card2:#F0EDE8;
  --border:#E2DBD4;--border2:#CFC6BC;
  --text:#0e1a3a;--muted:#7a7065;--hover:#F0EDE8;
  --green:#16A34A;--red:#DC2626;--yellow:#B45309;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR — igual ao portal */
.topbar{
  background:var(--navy);height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
}
.tb-logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#fff;letter-spacing:.5px}
.tb-logo span{color:var(--gold);font-weight:600}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-emp{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.3px}
.tb-mes{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}

/* MÊS SELECTOR — estilo das tabs do portal */
.mes-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px}
.mes-bar{display:flex;gap:0;overflow-x:auto}
.mes-btn{
  padding:14px 18px;font-size:11px;cursor:pointer;
  border:none;background:transparent;color:var(--muted);
  font-family:inherit;transition:all .2s;white-space:nowrap;
  border-bottom:2px solid transparent;position:relative;
}
.mes-btn:hover{color:var(--text)}
.mes-btn.active{color:var(--navy);border-bottom-color:var(--q);font-weight:600}

/* BODY */
.body{padding:24px 28px;max-width:1200px;margin:0 auto}

/* SECTION TITLE — igual ao portal */
.sec-tit{
  font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;
  color:var(--navy);margin:24px 0 14px;padding-bottom:10px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;
}
.sec-tit::before{content:'◆';font-size:10px;color:var(--gold)}

/* CARDS KPI — igual ao portal (.kpi-card) */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.kc{
  background:var(--card);border-radius:var(--r);
  padding:20px 22px;border:1px solid var(--border);
  box-shadow:var(--sh);position:relative;overflow:hidden;
  transition:box-shadow .2s;
}
.kc:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.kc-g{border-top:3px solid var(--green)}
.kc-r{border-top:3px solid var(--red)}
.kc-q{border-top:3px solid var(--q)}
.kc-go{border-top:3px solid var(--gold)}
.kc-n{border-top:3px solid var(--navy)}
.kl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600}
.kv{font-size:24px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--text);line-height:1.1}
.kv.pos{color:var(--green)}.kv.neg{color:var(--red)}.kv.go{color:var(--gold)}
.ks{font-size:10px;color:var(--muted);margin-top:5px}
.ki{position:absolute;top:16px;right:18px;font-size:24px;opacity:.1}

/* PROGRESSO */
.prog{background:var(--card);border-radius:var(--r);padding:20px 22px;border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:20px}
.prog-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.prog-trk{background:var(--card2);border-radius:20px;height:6px;overflow:hidden}
.prog-fill{height:6px;border-radius:20px;background:linear-gradient(90deg,var(--qdark),var(--q),var(--q2));transition:width 1s ease}
.prog-sub{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:8px}

/* GRÁFICOS */
.cc{background:var(--card);border-radius:var(--r);padding:20px;border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:20px}
.cct{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:600}
.ch{position:relative;height:220px}

/* SCORE — igual ao portal */
.score-wrap{background:var(--navy);border-radius:var(--r);padding:28px;margin-bottom:20px;box-shadow:0 4px 20px rgba(14,26,58,.3)}
.score-header{display:flex;align-items:flex-end;gap:24px;margin-bottom:24px}
.score-num{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;line-height:1}
.score-info{padding-bottom:8px}
.score-status{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.score-evol{font-size:11px;color:rgba(255,255,255,.5)}
.score-dims{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.score-dim{background:rgba(255,255,255,.06);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,.05)}
.score-dim-nome{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px}
.score-dim-val{font-size:26px;font-weight:700;font-family:'Cormorant Garamond',serif;line-height:1}
.score-dim-peso{font-size:9px;color:rgba(255,255,255,.3);margin-top:2px}
.score-dim-bar{background:rgba(255,255,255,.08);border-radius:20px;height:3px;margin-top:8px;overflow:hidden}
.score-dim-fill{height:3px;border-radius:20px;transition:width 1.2s ease}
.score-dim-descr{font-size:9px;color:rgba(255,255,255,.35);margin-top:6px;line-height:1.4}

/* BADGE */
.upd-badge{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;
  padding:8px 14px;border-radius:20px;font-size:10px;display:flex;align-items:center;
  gap:6px;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:200}
.upd-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* FOOTER */
.ft{background:var(--navy2);padding:16px 28px;text-align:center;font-size:10px;color:rgba(255,255,255,.3);margin-top:8px}

@media(max-width:900px){
  .kg{grid-template-columns:1fr 1fr}
  .kg2{grid-template-columns:1fr}
  .score-dims{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .kg{grid-template-columns:1fr}
  .score-dims{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">GFE <span>Financeiro</span> <span style="font-family:'DM Sans',sans-serif;font-size:10px;font-weight:300;color:rgba(255,255,255,.35);letter-spacing:1px">· Dashboard</span></div>
  <div class="tb-right">
    <div class="tb-emp" id="tb-emp">—</div>
    <div class="tb-mes" id="tb-mes">—</div>
  </div>
</div>

<div class="mes-wrap"><div class="mes-bar" id="mes-bar"></div></div>

<div class="body" id="dash-body"></div>

<div class="ft" id="dash-ft">GFE · Dashboard Automático · Dados via Google Sheets</div>

<div class="upd-badge">
  <div class="upd-dot"></div>
  <span id="upd-txt">Carregando...</span>
</div>

<script>
// ── DADOS INJETADOS PELO APPS SCRIPT ─────────────────────────────────────────
const CFG = {
  email:"cliente@empresa.com.br",
  senha:"senha2026",
  cliente:{nome:"Minha Empresa",segmento:""},
  meta:100000,
  dashboards:{},
  cartas:[]
};
const dadosMensais={labels:[],fat:[],desp:[],res:[],metas:[]};
const SCORE_CFG={atual:0,status:'alerta',periodo:'—',evolucao:'+0',dims:[],historico:[]};
const RUNWAY_CFG={saldo:0,despMensal:1,dataRef:'—'};
const VENCIMENTOS=[];
// ─────────────────────────────────────────────────────────────────────────────

const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const charts={};
let mesSel=0;

function fR(v){v=parseFloat(v)||0;const s=Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2});return(v>=0?'R$ ':'-R$ ')+s;}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function kc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function cor(v,t1,t2){return v>=t1?'var(--green)':v>=t2?'var(--yellow)':'var(--red)';}
function cls(v){return v>=0?'pos':'neg';}

function renderizar(mes){
  const fat  =dadosMensais.fat  ||[];
  const desp =dadosMensais.desp ||[];
  const res  =dadosMensais.res  ||[];
  const metas=dadosMensais.metas||[];
  const labels=dadosMensais.labels||MESES.map((_,i)=>['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][i]);
  const sc=SCORE_CFG;

  const fatM =fat[mes]||0, despM=desp[mes]||0, resM=res[mes]||0;
  const metaM=metas[mes]||CFG.meta||100000;
  const margem=fatM>0?((resM/fatM)*100).toFixed(1):0;
  const pM=pct(fatM,metaM);
  const fatAcum=fat.reduce((s,v)=>s+v,0);
  const metaAnu=metas.reduce((s,v)=>s+v,0)||(CFG.meta||100000)*12;
  const pA=pct(fatAcum,metaAnu);
  const despAcum=desp.reduce((s,v)=>s+v,0);
  const resAcum=fatAcum-despAcum;
  const mesNome=MESES[mes]||'—';
  const ano=new Date().getFullYear();
  const ss=sc.status||'alerta';
  const scCor={critico:'var(--red)',alerta:'var(--yellow)',saudavel:'var(--green)',estrategico:'#1D4ED8'}[ss]||'var(--yellow)';
  const scLabel={critico:'Crítico',alerta:'Em Alerta',saudavel:'Saudável',estrategico:'Estratégico'}[ss]||'—';

  document.getElementById('tb-emp').textContent=CFG.cliente?.nome||'GFE';
  document.getElementById('tb-mes').textContent=mesNome+' '+ano;

  // Tabs de meses
  const bar=document.getElementById('mes-bar');
  const mesesComDados=fat.map((v,i)=>v>0||desp[i]>0?i:-1).filter(i=>i>=0);
  if(!mesesComDados.length){bar.innerHTML='<div style="padding:14px 18px;font-size:11px;color:var(--muted)">Nenhum dado disponível</div>';return;}
  bar.innerHTML=mesesComDados.map(i=>`<button class="mes-btn${i===mes?' active':''}" onclick="selecionarMes(${i})">${MESES[i]}</button>`).join('');

  document.getElementById('dash-body').innerHTML=`
    <div class="sec-tit">Resumo — ${mesNome} ${ano}</div>
    <div class="kg">
      <div class="kc kc-g"><div class="ki">📥</div><div class="kl">Faturamento</div><div class="kv pos">${fR(fatM)}</div><div class="ks">${mesNome} ${ano}</div></div>
      <div class="kc kc-r"><div class="ki">📤</div><div class="kl">Despesas</div><div class="kv neg">${fR(despM)}</div><div class="ks">${mesNome} ${ano}</div></div>
      <div class="kc ${resM>=0?'kc-g':'kc-r'}"><div class="ki">📊</div><div class="kl">Resultado</div><div class="kv ${cls(resM)}">${fR(resM)}</div><div class="ks">Margem: ${margem}%</div></div>
      <div class="kc kc-go"><div class="ki">🎯</div><div class="kl">% da Meta</div><div class="kv" style="color:${cor(pM,100,70)}">${pM}%</div><div class="ks">Meta: ${fR(metaM)}</div></div>
    </div>
    <div class="prog">
      <div class="prog-top">
        <div><div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Meta Mensal — ${mesNome}</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:${cor(pM,100,70)}">${pM}%</div></div>
        <div style="text-align:right;font-size:12px;color:var(--muted)">${fR(fatM)}<br><span style="font-size:10px">de ${fR(metaM)}</span></div>
      </div>
      <div class="prog-trk"><div class="prog-fill" style="width:${Math.min(pM,100)}%"></div></div>
      <div class="prog-sub"><span>Faturamento realizado</span><strong>Meta: ${fR(metaM)}</strong></div>
    </div>
    <div class="sec-tit">Evolução Mensal</div>
    <div class="kg2">
      <div class="cc"><div class="cct">Faturamento vs Despesas</div><div class="ch"><canvas id="cFat"></canvas></div></div>
      <div class="cc"><div class="cct">Resultado Mensal</div><div class="ch"><canvas id="cRes"></canvas></div></div>
    </div>
    <div class="cc"><div class="cct">Faturamento vs Meta Mensal</div><div class="ch"><canvas id="cMeta"></canvas></div></div>
    <div class="sec-tit">GFE Score — ${sc.periodo||mesNome+' '+ano}</div>
    <div class="score-wrap">
      <div class="score-header">
        <div class="score-num" style="color:${scCor}">${sc.atual||0}</div>
        <div class="score-info">
          <div class="score-status">${scLabel}</div>
          <div class="score-evol">Evolução: <strong style="color:${(sc.evolucao||'+0').startsWith('-')?'var(--red)':'var(--green)'}">${sc.evolucao||'+0'} pts</strong> vs mês anterior</div>
        </div>
      </div>
      <div class="score-dims">
        ${(sc.dims||[]).map(d=>`
          <div class="score-dim">
            <div class="score-dim-nome">${d.nome}</div>
            <div class="score-dim-val" style="color:${d.val>=80?'var(--green)':d.val>=60?'var(--yellow)':'var(--red)'}">${d.val}</div>
            <div class="score-dim-peso">${d.peso}</div>
            <div class="score-dim-bar"><div class="score-dim-fill" style="width:${d.val}%;background:${d.val>=80?'var(--green)':d.val>=60?'var(--yellow)':'var(--red)'}"></div></div>
            <div class="score-dim-descr">${d.descr||''}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="sec-tit">Acumulado ${ano}</div>
    <div class="kg">
      <div class="kc kc-g"><div class="kl">Fat. Acumulado</div><div class="kv pos">${fR(fatAcum)}</div></div>
      <div class="kc kc-r"><div class="kl">Desp. Acumuladas</div><div class="kv neg">${fR(despAcum)}</div></div>
      <div class="kc ${resAcum>=0?'kc-g':'kc-r'}"><div class="kl">Resultado Acum.</div><div class="kv ${cls(resAcum)}">${fR(resAcum)}</div></div>
      <div class="kc kc-q"><div class="kl">Execução Meta Anual</div><div class="kv" style="color:${cor(pA,100,50)}">${pA}%</div><div class="ks">${fR(fatAcum)} de ${fR(metaAnu)}</div></div>
    </div>
    <div class="prog">
      <div class="prog-top">
        <div><div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Meta Anual ${ano}</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:${cor(pA,100,50)}">${pA}%</div></div>
        <div style="text-align:right;font-size:12px;color:var(--muted)">${fR(fatAcum)}<br><span style="font-size:10px">de ${fR(metaAnu)}</span></div>
      </div>
      <div class="prog-trk"><div class="prog-fill" style="width:${Math.min(pA,100)}%"></div></div>
      <div class="prog-sub"><span>Faturamento acumulado</span><strong>Meta Anual: ${fR(metaAnu)}</strong></div>
    </div>
  `;

  setTimeout(()=>{
    const opts={responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:10},boxWidth:10,padding:10}}},
      scales:{
        y:{ticks:{callback:v=>'R$'+(Math.abs(v)/1000).toFixed(0)+'k',font:{size:9.5}},grid:{color:'#E2DBD4'}},
        x:{ticks:{font:{size:9.5}},grid:{display:false}}
      }
    };
    kc('cFat');
    charts['cFat']=new Chart(document.getElementById('cFat'),{type:'bar',data:{labels,datasets:[
      {label:'Faturamento',data:fat,backgroundColor:'rgba(22,163,74,.7)',borderRadius:4,borderSkipped:false},
      {label:'Despesas',data:desp,backgroundColor:'rgba(220,38,38,.7)',borderRadius:4,borderSkipped:false}
    ]},options:opts});
    kc('cRes');
    charts['cRes']=new Chart(document.getElementById('cRes'),{type:'bar',data:{labels,datasets:[{
      label:'Resultado',data:res,
      backgroundColor:res.map(v=>v>=0?'rgba(22,163,74,.75)':'rgba(220,38,38,.75)'),
      borderRadius:5,borderSkipped:false
    }]},options:{...opts,plugins:{legend:{display:false}}}});
    kc('cMeta');
    charts['cMeta']=new Chart(document.getElementById('cMeta'),{type:'bar',data:{labels,datasets:[
      {label:'Faturamento',data:fat,backgroundColor:'rgba(184,150,110,.8)',borderRadius:4,borderSkipped:false},
      {label:'Meta',data:metas,type:'line',borderColor:'rgba(14,26,58,.6)',borderDash:[5,4],fill:false,tension:0,pointRadius:3,borderWidth:2}
    ]},options:opts});
    document.getElementById('upd-txt').textContent='Atualizado: '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('dash-ft').textContent=`${CFG.cliente?.nome||'GFE'} · Dashboard GFE · ${new Date().toLocaleDateString('pt-BR')}`;
  },100);
}

function selecionarMes(i){mesSel=i;renderizar(mesSel);}

window.addEventListener('load',()=>{
  const fat=dadosMensais.fat||[];
  const com=fat.map((v,i)=>({i,v})).filter(x=>x.v>0);
  mesSel=com.length>0?com[com.length-1].i:new Date().getMonth();
  renderizar(mesSel);
});
</script>
</body>
</html>

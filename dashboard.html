<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard GFE — Clara Assistance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F4F2;color:#0e1a3a;min-height:100vh}
.dh{background:#0e1a3a;padding:18px 32px;display:flex;justify-content:space-between;align-items:center}
.dh-logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:#fff}
.dh-logo span{color:#b8966e;font-weight:600}
.dh-right{text-align:right}
.dh-emp{font-size:13px;color:rgba(255,255,255,.7)}
.dh-mes{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#b8966e;margin-top:2px}
.mes-bar{background:#fff;border-bottom:1px solid #E2DBD4;padding:12px 32px;display:flex;gap:8px;overflow-x:auto;flex-wrap:wrap}
.mes-btn{padding:6px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid #E2DBD4;background:transparent;color:#7a7065;font-family:inherit;transition:all .2s;white-space:nowrap}
.mes-btn:hover{border-color:#0e1a3a;color:#0e1a3a}
.mes-btn.active{background:#0e1a3a;color:#fff;border-color:#0e1a3a}
.body{padding:24px 32px;max-width:1200px;margin:0 auto}
.sec-tit{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#0e1a3a;margin:20px 0 14px;padding-bottom:10px;border-bottom:1px solid #E2DBD4}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.kc{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #E2DBD4;position:relative;overflow:hidden}
.kc-g{border-top:3px solid #16A34A}.kc-r{border-top:3px solid #DC2626}
.kc-q{border-top:3px solid #7B2FBE}.kc-go{border-top:3px solid #b8966e}.kc-n{border-top:3px solid #0e1a3a}
.kl{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:#7a7065;margin-bottom:6px}
.kv{font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;color:#0e1a3a}
.kv.pos{color:#16A34A}.kv.neg{color:#DC2626}.kv.go{color:#b8966e}
.ks{font-size:10px;color:#7a7065;margin-top:4px}
.ki{position:absolute;top:14px;right:16px;font-size:22px;opacity:.12}
.prog{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #E2DBD4;margin-bottom:20px}
.prog-trk{background:#F0EDE8;border-radius:20px;height:6px;overflow:hidden;margin:8px 0}
.prog-fill{height:6px;border-radius:20px;background:linear-gradient(90deg,#5B1F9A,#7B2FBE,#9B4FDE);transition:width 1s ease}
.cc{background:#fff;border-radius:12px;padding:18px;border:1px solid #E2DBD4;margin-bottom:20px}
.cct{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#7a7065;margin-bottom:14px}
.ch{position:relative;height:220px}
.score-box{background:#0e1a3a;border-radius:12px;padding:24px;color:#fff;margin-bottom:20px}
.score-num{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:300;line-height:1}
.score-dims{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:20px}
.score-dim{background:rgba(255,255,255,.06);border-radius:10px;padding:12px}
.score-dim-nome{font-size:9px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;letter-spacing:.5px}
.score-dim-val{font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif}
.score-dim-peso{font-size:9px;color:rgba(255,255,255,.35);margin-top:2px}
.score-dim-bar{background:rgba(255,255,255,.1);border-radius:20px;height:3px;margin-top:6px;overflow:hidden}
.score-dim-fill{height:3px;border-radius:20px;transition:width 1s ease}
.score-dim-descr{font-size:9px;color:rgba(255,255,255,.4);margin-top:4px;line-height:1.3}
.update-badge{position:fixed;bottom:20px;right:20px;background:#0e1a3a;color:#fff;padding:8px 14px;border-radius:20px;font-size:10px;display:flex;align-items:center;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:100}
.update-dot{width:6px;height:6px;background:#16A34A;border-radius:50%}
.ft{background:#0e1a3a;padding:16px 32px;text-align:center;font-size:10px;color:rgba(255,255,255,.3);margin-top:24px}
@media(max-width:900px){.kg{grid-template-columns:1fr 1fr}.kg2{grid-template-columns:1fr}.score-dims{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="dh">
  <div>
    <div class="dh-logo">GFE <span>Financeiro</span></div>
    <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:2px">Dashboard Interativo</div>
  </div>
  <div class="dh-right">
    <div class="dh-emp" id="dh-emp">—</div>
    <div class="dh-mes" id="dh-mes">—</div>
  </div>
</div>

<div class="mes-bar" id="mes-bar"></div>
<div class="body" id="dash-body"></div>
<div class="ft" id="dash-ft">GFE · Dashboard · Dados via Google Sheets</div>

<div class="update-badge">
  <div class="update-dot"></div>
  <span id="upd-txt">Carregando...</span>
</div>

<script>
// ── DADOS INJETADOS PELO APPS SCRIPT ─────────────────────────────────────────
const CFG = {
  email:"clara@claraassistance.com.br",
  senha:"clara2026",
  cliente:{nome:"Clara Assistance",segmento:"Assessoria Pessoal e Empresarial"},
  meta:20237.3,
  dashboards:{},
  cartas:[]
};
const dadosMensais={
  labels:["Jan","Fev","Mar","Abr*","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
  fat:[19364,35170.06,19192.96,22271.88,1505.39,0,0,0,0,0,0,0],
  desp:[14914.74,25800.28,22721,24053.5,6061.87,0,0,0,0,0,0,0],
  res:[4449.26,9369.78,-3528.04,-1781.62,-4556.48,0,0,0,0,0,0,0],
  metas:[18043.43,18964,24870,20237.3,18043.43,10522,18043.43,18043.43,18043.43,18043.43,18043.43,18043.43]
};
const SCORE_CFG={
  atual:57,
  status:'alerta',
  periodo:'Abril 2026',
  evolucao:'+11',
  dims:[
    {nome:'Liquidez',val:0,prev:0,peso:'25%',descr:"Saldo cobre 0% dos compromissos (R$ 0,00 disponível, R$ 9.060,00 a pagar)"},
    {nome:'Inadimplência',val:100,prev:95,peso:'25%',descr:"Sem inadimplência registrada. Todos os recebimentos em dia."},
    {nome:'Margem Líquida',val:15,prev:10,peso:'20%',descr:"Margem líquida de -8% (meta: ≥ 20%). Despesas superam receitas — atenção urgente."},
    {nome:'Execução da Meta',val:100,prev:95,peso:'20%',descr:"110.05% da meta mensal atingida (R$ 22.271,88 de R$ 20.237,30). Meta superada! 🎯"},
    {nome:'Organização Financ.',val:85,prev:80,peso:'10%',descr:"Dados financeiros bem organizados. 1,2,3,4 meses com lançamentos registrados."}
  ],
  historico:[]
};
const RUNWAY_CFG={saldo:0,despMensal:24053.5,dataRef:'26/05/2026'};
const VENCIMENTOS=[];
// ─────────────────────────────────────────────────────────────────────────────

const MESES_PT=['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const charts={};

function fmtR(v){
  v=parseFloat(v)||0;
  const s=Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2});
  return(v>=0?'R$ ':'-R$ ')+s;
}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function kc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

let mesSel=0;

function renderizar(mes){
  const fat  =dadosMensais.fat  ||[];
  const desp =dadosMensais.desp ||[];
  const res  =dadosMensais.res  ||[];
  const metas=dadosMensais.metas||[];
  const labels=dadosMensais.labels||MESES_PT.map((_,i)=>['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][i]);
  const score=SCORE_CFG;

  const fatM =fat[mes] ||0;
  const despM=desp[mes]||0;
  const resM =res[mes] ||0;
  const metaM=metas[mes]||CFG.meta||100000;
  const margem=fatM>0?((resM/fatM)*100).toFixed(1):0;
  const pctMeta=pct(fatM,metaM);
  const fatAcum=fat.reduce((s,v)=>s+v,0);
  const metaAnu=metas.reduce((s,v)=>s+v,0)||(CFG.meta||100000)*12;
  const pctAnu=pct(fatAcum,metaAnu);
  const despAcum=desp.reduce((s,v)=>s+v,0);
  const resAcum=fatAcum-despAcum;
  const mesNome=MESES_PT[mes]||'—';
  const ano=new Date().getFullYear();
  const scoreStatus=score.status||'alerta';
  const scoreColor={critico:'#DC2626',alerta:'#B45309',saudavel:'#16A34A',estrategico:'#1D4ED8'}[scoreStatus]||'#B45309';
  const corPM=pctMeta>=100?'#16A34A':pctMeta>=70?'#B45309':'#DC2626';
  const corPA=pctAnu>=100?'#16A34A':pctAnu>=50?'#B45309':'#DC2626';

  document.getElementById('dh-emp').textContent=CFG.cliente?.nome||'GFE';
  document.getElementById('dh-mes').textContent=mesNome+' '+ano;

  // Seletor meses com dados
  const bar=document.getElementById('mes-bar');
  const mesesComDados=fat.map((v,i)=>v>0||desp[i]>0?i:-1).filter(i=>i>=0);
  bar.innerHTML=mesesComDados.map(i=>`<button class="mes-btn ${i===mes?'active':''}" onclick="selecionarMes(${i})">${MESES_PT[i]}</button>`).join('');

  document.getElementById('dash-body').innerHTML=`
    <div class="sec-tit">Resumo — ${mesNome} ${ano}</div>
    <div class="kg">
      <div class="kc kc-g"><div class="ki">📥</div><div class="kl">Faturamento</div><div class="kv pos">${fmtR(fatM)}</div><div class="ks">${mesNome} ${ano}</div></div>
      <div class="kc kc-r"><div class="ki">📤</div><div class="kl">Despesas</div><div class="kv neg">${fmtR(despM)}</div><div class="ks">${mesNome} ${ano}</div></div>
      <div class="kc ${resM>=0?'kc-g':'kc-r'}"><div class="ki">📊</div><div class="kl">Resultado</div><div class="kv ${resM>=0?'pos':'neg'}">${fmtR(resM)}</div><div class="ks">Margem: ${margem}%</div></div>
      <div class="kc kc-go"><div class="ki">🎯</div><div class="kl">% da Meta</div><div class="kv" style="color:${corPM}">${pctMeta}%</div><div class="ks">Meta: ${fmtR(metaM)}</div></div>
    </div>
    <div class="prog">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <div><div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#7a7065">Meta Mensal — ${mesNome}</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:${corPM}">${pctMeta}%</div></div>
        <div style="font-size:12px;color:#7a7065">${fmtR(fatM)} de ${fmtR(metaM)}</div>
      </div>
      <div class="prog-trk"><div class="prog-fill" style="width:${Math.min(pctMeta,100)}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10.5px;color:#7a7065"><span>Faturamento realizado</span><strong>Meta: ${fmtR(metaM)}</strong></div>
    </div>
    <div class="sec-tit">Evolução Mensal</div>
    <div class="kg2">
      <div class="cc"><div class="cct">📊 Faturamento vs Despesas</div><div class="ch"><canvas id="cFat"></canvas></div></div>
      <div class="cc"><div class="cct">📈 Resultado Mensal</div><div class="ch"><canvas id="cRes"></canvas></div></div>
    </div>
    <div class="cc"><div class="cct">🎯 Faturamento vs Meta</div><div class="ch"><canvas id="cMeta"></canvas></div></div>
    <div class="sec-tit">GFE Score — ${score.periodo||mesNome+' '+ano}</div>
    <div class="score-box">
      <div style="display:flex;align-items:flex-end;gap:20px;margin-bottom:4px">
        <div><div class="score-num" style="color:${scoreColor}">${score.atual||0}</div>
        <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#b8966e;margin-top:4px">${{critico:'Crítico',alerta:'Em Alerta',saudavel:'Saudável',estrategico:'Estratégico'}[scoreStatus]||'—'}</div></div>
        <div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:8px">Evolução: <strong style="color:${(score.evolucao||'0').startsWith('-')?'#DC2626':'#16A34A'}">${score.evolucao||'+0'}</strong> pts</div>
      </div>
      <div class="score-dims">
        ${(score.dims||[]).map(d=>`<div class="score-dim">
          <div class="score-dim-nome">${d.nome}</div>
          <div class="score-dim-val" style="color:${d.val>=80?'#16A34A':d.val>=60?'#B45309':'#DC2626'}">${d.val}</div>
          <div class="score-dim-peso">${d.peso}</div>
          <div class="score-dim-bar"><div class="score-dim-fill" style="width:${d.val}%;background:${d.val>=80?'#16A34A':d.val>=60?'#B45309':'#DC2626'}"></div></div>
          <div class="score-dim-descr">${d.descr||''}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="sec-tit">Acumulado ${ano}</div>
    <div class="kg">
      <div class="kc kc-g"><div class="kl">Fat. Acumulado</div><div class="kv pos">${fmtR(fatAcum)}</div></div>
      <div class="kc kc-r"><div class="kl">Desp. Acumuladas</div><div class="kv neg">${fmtR(despAcum)}</div></div>
      <div class="kc ${resAcum>=0?'kc-g':'kc-r'}"><div class="kl">Resultado Acum.</div><div class="kv ${resAcum>=0?'pos':'neg'}">${fmtR(resAcum)}</div></div>
      <div class="kc kc-q"><div class="kl">Execução Meta Anual</div><div class="kv" style="color:${corPA}">${pctAnu}%</div><div class="ks">${fmtR(fatAcum)} de ${fmtR(metaAnu)}</div></div>
    </div>
    <div class="prog">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <div><div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#7a7065">Meta Anual ${ano}</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:${corPA}">${pctAnu}%</div></div>
        <div style="font-size:12px;color:#7a7065">${fmtR(fatAcum)} de ${fmtR(metaAnu)}</div>
      </div>
      <div class="prog-trk"><div class="prog-fill" style="width:${Math.min(pctAnu,100)}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10.5px;color:#7a7065"><span>Faturamento acumulado</span><strong>Meta Anual: ${fmtR(metaAnu)}</strong></div>
    </div>
  `;

  setTimeout(()=>{
    const opts={responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:10},boxWidth:10,padding:10}}},
      scales:{y:{ticks:{callback:v=>'R$'+(Math.abs(v)/1000).toFixed(0)+'k',font:{size:9.5}},grid:{color:'#E2DBD4'}},x:{ticks:{font:{size:9.5}},grid:{display:false}}}};
    kc('cFat');
    charts['cFat']=new Chart(document.getElementById('cFat'),{type:'bar',data:{labels,datasets:[
      {label:'Faturamento',data:fat,backgroundColor:'rgba(22,163,74,.7)',borderRadius:4,borderSkipped:false},
      {label:'Despesas',data:desp,backgroundColor:'rgba(220,38,38,.7)',borderRadius:4,borderSkipped:false}
    ]},options:opts});
    kc('cRes');
    charts['cRes']=new Chart(document.getElementById('cRes'),{type:'bar',data:{labels,datasets:[{
      label:'Resultado',data:res,
      backgroundColor:res.map(v=>v>=0?'rgba(22,163,74,.75)':'rgba(220,38,38,.75)'),
      borderRadius:5,borderSkipped:false
    }]},options:{...opts,plugins:{legend:{display:false}}}});
    kc('cMeta');
    charts['cMeta']=new Chart(document.getElementById('cMeta'),{type:'bar',data:{labels,datasets:[
      {label:'Faturamento',data:fat,backgroundColor:'rgba(184,150,110,.8)',borderRadius:4,borderSkipped:false},
      {label:'Meta',data:metas,type:'line',borderColor:'rgba(14,26,58,.5)',borderDash:[6,4],fill:false,tension:0,pointRadius:3,borderWidth:2}
    ]},options:opts});
    document.getElementById('upd-txt').textContent='Atualizado: '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  },100);
}

function selecionarMes(i){mesSel=i;renderizar(mesSel);}

window.addEventListener('load',()=>{
  const fat=dadosMensais.fat||[];
  const mesesComDados=fat.map((v,i)=>({i,v})).filter(x=>x.v>0);
  mesSel=mesesComDados.length>0?mesesComDados[mesesComDados.length-1].i:new Date().getMonth();
  renderizar(mesSel);
});
</script>
</body>
</html>
